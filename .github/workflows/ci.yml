name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: ruff check --output-format=github .

      - name: Format check with Black
        run: black --check .

      - name: Type check with Mypy
        run: mypy

      - name: Create .env file
        run: |
          cat << EOF > .env
          LICHESS_API_TOKEN=${{ secrets.LICHESS_API_TOKEN }}
          LICHESS_USERNAME=${{ secrets.LICHESS_USERNAME }}
          DSB_USERNAME=${{ secrets.DSB_USERNAME }}
          DSB_PASSWORD=${{ secrets.DSB_PASSWORD }}
          PLAYER_NAME=${{ secrets.PLAYER_NAME }}
          RATING_CLIENT=${{ secrets.RATING_CLIENT }}
          EOF

      - name: Run tests
        run: pytest
